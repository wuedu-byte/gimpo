<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>카카오맵 - 김포시 학생 밀집도 히트맵 시뮬레이션</title>
    <style>
        body, html { width: 100%; height: 100%; margin: 0; padding: 0; }
        #map { width: 100%; height: 100vh; }
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            font-family: sans-serif;
        }
    </style>
</head>
<body>

<div class="info-panel">
    <h3>김포시 학교별 학생 밀집도 (히트맵 효과)</h3>
    <p>붉은 원의 크기와 진하기(투명도)는 학생 수에 비례합니다.</p>
</div>

<div id="map"></div>

<!-- 카카오맵 API 스크립트 -->
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=1040b91e9a6652ed588ed5a37bf286da"></script>
<script>
    // 1. 지도 초기화 (중심: 김포시청 주변)
    var mapContainer = document.getElementById('map'), // 지도를 표시할 div 
        mapOption = { 
            center: new kakao.maps.LatLng(37.615246, 126.715632), // 김포시청 좌표
            level: 5 // 지도의 확대 레벨
        };  
    
    var map = new kakao.maps.Map(mapContainer, mapOption); 

    // 2. 샘플 데이터 (데이터 교체가 용이한 JSON 배열)
    // count는 '학급별 학생수'를 의미합니다.
    var sampleData = [
        { name: '김포고등학교', lat: 37.6186, lng: 126.7126, count: 31.8 },
        { name: '김포과학기술고등학교', lat: 37.6253, lng: 126.7093, count: 18.4 },
        { name: '사우고등학교', lat: 37.6208, lng: 126.7196, count: 32.2 },
        { name: '풍무고등학교', lat: 37.6041, lng: 126.7214, count: 28.5 },
        { name: '장기고등학교', lat: 37.6432, lng: 126.6669, count: 29.1 }
    ];

    // 3. 학생수 최대값 구하기 (비율 계산용)
    var maxCount = Math.max.apply(Math, sampleData.map(function(d) { return d.count; }));

    // 4. 데이터를 순회하며 지도에 히트맵 효과(Circle) 오버레이 생성
    sampleData.forEach(function(data) {
        // 학생 수에 비례하여 비율(0.0 ~ 1.0) 계산
        var ratio = data.count / maxCount;
        
        // 반경(radius)과 투명도(opacity)를 학생 수에 비례하게 설정
        var calculatedRadius = 100 + (ratio * 400); // 최소 100m ~ 최대 500m
        var calculatedOpacity = 0.3 + (ratio * 0.5); // 최소 0.3 ~ 최대 0.8

        // 원 객체 생성
        var circle = new kakao.maps.Circle({
            center: new kakao.maps.LatLng(data.lat, data.lng),
            radius: calculatedRadius,
            strokeWeight: 0, // 테두리 없음 (히트맵처럼 보이게)
            fillColor: '#FF0000', // 붉은색
            fillOpacity: calculatedOpacity // 계산된 투명도 적용
        });

        // 지도에 원 표시
        circle.setMap(map);

        // (선택) 마우스 오버 시 정보를 보여주는 인포윈도우 추가
        var infowindow = new kakao.maps.InfoWindow({
            content: '<div style="padding:5px;font-size:12px;">' + data.name + ' (' + data.count + '명)</div>'
        });

        kakao.maps.event.addListener(circle, 'mouseover', function() {
            infowindow.setPosition(new kakao.maps.LatLng(data.lat, data.lng));
            infowindow.setMap(map);
        });

        kakao.maps.event.addListener(circle, 'mouseout', function() {
            infowindow.setMap(null);
        });
    });
</script>
</body>
</html>
